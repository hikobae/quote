name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build-and-upload:
    name: Build and Upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: quote
            archive_name: quote-${{ github.ref_name }}-linux-x86_64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: quote.exe
            archive_name: quote-${{ github.ref_name }}-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: quote
            archive_name: quote-${{ github.ref_name }}-macos-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package ZIP (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          zip -j "${{ matrix.archive_name }}" quote "${{ github.workspace }}/README.md" "${{ github.workspace }}/LICENSE"

      - name: Package ZIP (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          powershell -Command "Compress-Archive -Path quote.exe, '${{ github.workspace }}\\README.md', '${{ github.workspace }}\\LICENSE', '${{ github.workspace }}\\quote-clipboard.bat' -DestinationPath '${{ matrix.archive_name }}' -Force"

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./target/${{ matrix.target }}/release/${{ matrix.archive_name }}
          asset_name: ${{ matrix.archive_name }}
          asset_content_type: application/zip
